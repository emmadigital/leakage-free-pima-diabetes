<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500">

<style>
.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:18}
.modelbox{fill:#f1f5f9;stroke:#334155;stroke-width:2;rx:18}
.baseline{fill:#e0f2fe}
.neural{fill:#fee2e2}
.eval{fill:#fff7ed}
.final{fill:#ecfdf5}

.title{font-family:Arial;font-size:34px;font-weight:bold}
.text{font-family:Arial;font-size:20px}
.small{font-family:Arial;font-size:18px}

.arrow{stroke:#475569;stroke-width:3;marker-end:url(#arrowhead)}
</style>

<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#475569"></polygon>
</marker>
</defs>

<!-- TITLE -->
<text x="600" y="60" text-anchor="middle" class="title">
Leakage-Free Diabetes Prediction Workflow
</text>

<!-- DATASET -->
<rect x="200" y="110" width="800" height="80" class="box"></rect>
<text x="600" y="155" text-anchor="middle" class="text">
1. Dataset: Pima Indians Diabetes Dataset (N = 768)
</text>

<line x1="600" y1="190" x2="600" y2="240" class="arrow"></line>

<!-- PREPROCESSING -->
<rect x="200" y="240" width="800" height="120" class="box baseline"></rect>
<text x="600" y="285" text-anchor="middle" class="text">
2. Fold-Contained Preprocessing
</text>
<text x="600" y="320" text-anchor="middle" class="small">
Median imputation + Min-Max normalization (training folds only)
</text>

<line x1="600" y1="360" x2="600" y2="420" class="arrow"></line>

<!-- CROSS VALIDATION -->
<rect x="200" y="420" width="800" height="100" class="box baseline"></rect>
<text x="600" y="465" text-anchor="middle" class="text">
3. Multi-Seed Stratified 10-Fold Cross-Validation
</text>

<line x1="600" y1="520" x2="600" y2="580" class="arrow"></line>

<!-- MODEL DEVELOPMENT -->
<rect x="200" y="580" width="800" height="220" class="modelbox"></rect>

<text x="600" y="620" text-anchor="middle" class="text">
4. Model Development
</text>

<!-- BASELINE MODELS -->
<rect x="260" y="650" width="300" height="120" class="baseline"></rect>
<text x="410" y="690" text-anchor="middle" class="text">
Baseline Models
</text>
<text x="410" y="720" text-anchor="middle" class="small">
Logistic Regression
</text>
<text x="410" y="750" text-anchor="middle" class="small">
Random Forest
</text>

<!-- NEURAL MODELS -->
<rect x="640" y="650" width="300" height="120" class="neural"></rect>
<text x="790" y="690" text-anchor="middle" class="text">
Neural Network Models
</text>
<text x="790" y="720" text-anchor="middle" class="small">
Plain FFNN • BPNN
</text>
<text x="790" y="750" text-anchor="middle" class="small">
GRNN • ABC-FFNN
</text>

<line x1="600" y1="800" x2="600" y2="860" class="arrow"></line>

<!-- EVALUATION -->
<rect x="200" y="860" width="800" height="140" class="box eval"></rect>
<text x="600" y="900" text-anchor="middle" class="text">
5. Performance Evaluation
</text>
<text x="600" y="935" text-anchor="middle" class="small">
Accuracy • Sensitivity • Specificity • F1-Score • ROC-AUC
</text>
<text x="600" y="965" text-anchor="middle" class="small">
Brier Score • Calibration Slope • Calibration Intercept
</text>

<line x1="600" y1="1000" x2="600" y2="1060" class="arrow"></line>

<!-- STATISTICAL TESTS -->
<rect x="200" y="1060" width="800" height="120" class="box eval"></rect>
<text x="600" y="1100" text-anchor="middle" class="text">
6. Statistical Significance Testing
</text>
<text x="600" y="1135" text-anchor="middle" class="small">
Paired t-test • Wilcoxon signed-rank
</text>
<text x="600" y="1165" text-anchor="middle" class="small">
DeLong test (AUC) • McNemar’s test
</text>

<line x1="600" y1="1180" x2="600" y2="1240" class="arrow"></line>

<!-- FINAL -->
<rect x="200" y="1240" width="800" height="100" class="box final"></rect>
<text x="600" y="1285" text-anchor="middle" class="text">
7. Reliable Model Comparison
</text>
<text x="600" y="1315" text-anchor="middle" class="small">
Leakage-Free and Reproducible Diabetes Prediction Framework
</text>

</svg>